[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''
                if pseudorandom('soul_'..v.key.._type..G.GAME.round_resets.ante) > (1 - v.soul_rate) then
                    forced_key = v.key
                end
'''
position = "at"
payload = '''
                if pseudorandom('soul_'..v.key.._type..G.GAME.round_resets.ante) > (1 - v.soul_rate) then
                    if not G.GAME.banned_keys[v.key] then forced_key = v.key end
                end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''
local temp_pool =   (self.ability.name == 'The Wheel of Fortune' and self.eligible_strength_jokers) or 
                            ((self.ability.name == 'Ectoplasm' or self.ability.name == 'Hex') and self.eligible_editionless_jokers) or {}'''
position = "at"
payload = '''

local temp_pool =   (self.ability.name == 'The Wheel of Fortune' and self.eligible_strength_jokers) or 
                            (self.eligible_editionless_jokers)

if not temp_pool then
    temp_pool = {}
    for i, v in pairs(G.jokers.cards) do
        if not v.edition then
            temp_pool[#temp_pool+1] = v
        end
    end
end
'''
match_indent = true 

[[patches]]
[patches.pattern]
target = '''=[SMODS _ "src/utils.lua"]'''
pattern = '''
for _,v in ipairs(available_enhancements) do
'''
position = "at"
payload = '''
local new_opts = {}
for _,v in ipairs(available_enhancements) do
  if not (G.GAME.banned_keys[v.key] or v.no_doe) then
    new_opts[#new_opts + 1] = v
  end
end
if #new_opts == 0 then
  new_opts[1] = "m_mult"
end
for _,v in ipairs(new_opts) do
'''
match_indent = true

[[patches]]
[patches.pattern]
target = '''=[SMODS _ "src/utils.lua"]'''
pattern = '''
local seal_poll = pseudorandom(pseudoseed(key or 'stdseal'..G.GAME.round_resets.ante))
'''
position = "before"
payload = '''
local new_opts = {}
for _,v in ipairs(available_seals) do
  if not (G.GAME.banned_keys[v.key] or v.no_doe) then
    new_opts[#new_opts + 1] = v
  end
end
if #new_opts == 0 then
  new_opts[1] = "Red"
end
available_seals = new_opts
'''
match_indent = true

[[patches]]
[patches.pattern]
target = '''functions/UI_definitions.lua'''
pattern = '''
        {n=G.UIT.C, config={align = "cr", padding = 0.01, r = 0.1, colour = G.C.CHIPS, minw = 1.1}, nodes={
