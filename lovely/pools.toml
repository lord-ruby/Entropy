        {n=G.UIT.C, config={align = "cr", padding = 0.01, r = 0.1, colour = (G.GAME.badarg or {})[handname] and HEX("FF0000") or G.C.CHIPS, minw = 1.1}, nodes={
          {n=G.UIT.T, config={text = (G.GAME.badarg or {})[handname] and "BAD" or number_format(G.GAME.hands[handname].chips, 1000000), scale = 0.45, colour = G.C.UI.TEXT_LIGHT}},
          {n=G.UIT.B, config={w = 0.08, h = 0.01}}
        }},
        {n=G.UIT.T, config={text = "X", scale = 0.45, colour = (G.GAME.badarg or {})[handname] and HEX("FF0000") or G.C.MULT}},
        {n=G.UIT.C, config={align = "cl", padding = 0.01, r = 0.1, colour = (G.GAME.badarg or {})[handname] and HEX("FF0000") or G.C.MULT, minw = 1.1}, nodes={
          {n=G.UIT.B, config={w = 0.08,h = 0.01}},
          {n=G.UIT.T, config={text = (G.GAME.badarg or {})[handname] and "ARG" or number_format(G.GAME.hands[handname].mult, 1000000), scale = 0.45, colour = G.C.UI.TEXT_LIGHT}}
        }}
'''
match_indent = true

[[patches]]
[patches.pattern]
target = '''functions/common_events.lua'''
pattern = '''
local new_card = new_card or Card(other.T.x, other.T.y, G.CARD_W*(card_scale or 1), G.CARD_H*(card_scale or 1), G.P_CARDS.empty, G.P_CENTERS.c_base, {playing_card = playing_card, bypass_back = G.GAME.selected_back.pos})
'''
position = "at"
payload = '''
other.T = other.T or {x = 1, y = 1, w = 1, h = 1}
local new_card = new_card or Card(other.T.x, other.T.y, G.CARD_W*(card_scale or 1), G.CARD_H*(card_scale or 1), G.P_CARDS.empty, G.P_CENTERS.c_base, {playing_card = playing_card, bypass_back = G.GAME.selected_back.pos})
'''
match_indent = true

[[patches]]
[patches.pattern]
target = '''functions/common_events.lua'''
