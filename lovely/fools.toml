[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

### Rarity API

# get_badge_colour
[[patches]]
[patches.pattern]
target = '''=[SMODS _ "src/game_object.lua"]'''
pattern = '''
get_rarity_badge = function(self, rarity)
    local vanilla_rarity_keys = {localize('k_common'), localize('k_uncommon'), localize('k_rare'), localize('k_legendary')}
    if (vanilla_rarity_keys)[rarity] then
        return vanilla_rarity_keys[rarity] --compat layer in case function gets the int of the rarity
    else
        return localize("k_"..rarity:lower())
    end
end,
'''
position = 'at'
match_indent = true
payload = '''
get_rarity_badge = function(self, rarity, center)
    return  Entropy.localize_rarity(center, rarity)
end,
'''

[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = "if AUT.card_type == 'Joker' or (AUT.badges and AUT.badges.force_rarity) then card_type = SMODS.Rarity:get_rarity_badge(card.config.center.rarity) end"
position = "at"
payload = "if AUT.card_type == 'Joker' or (AUT.badges and AUT.badges.force_rarity) then card_type = SMODS.Rarity:get_rarity_badge(card.config.center.rarity, card.config.center) end"
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = "(_c.set == 'Joker' and G.C.RARITY[_c.rarity]) or"
position = "at"
payload = "(_c.set == 'Joker' and Entropy.get_rarity_colour(_c.rarity, card, _c)) or"
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = "if eligible_bosses[k] > min_use then "
position = "at"
payload = 'if (type(eligible_bosses[k]) == "number" and eligible_bosses[k] or (eligible_bosses[k] and 1 or 0)) > min_use then '
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/misc_functions.lua"
pattern = "elseif part.control.E then"
position = "before"
payload = '''
elseif part.control.CANVAS then
    if not G.CANVASES then G.CANVASES = {} end
    local cw = part.control.cw or 1920
    local ch = part.control.ch or 1080
    local s = part.control.s or 1
    cw = (cw*desc_scale)
    ch = (ch*desc_scale)
    local is = 1/desc_scale
    if G.CANVASES[part.control.CANVAS] then G.CANVASES[part.control.CANVAS]:remove() end
    G.CANVASES[part.control.CANVAS] = SMODS.CanvasSprite(
        {X=0, Y=0, W=(G.CANVAS_DESC_SCALE*s), H=(G.CANVAS_DESC_SCALE*s)*ch/cw, canvasW=cw, canvasH=ch, canvasScale=is}
    )
    final_line[#final_line + 1] = {
        n = G.UIT.O,
        config = {
            align = "cm",
            object = G.CANVASES[part.control.CANVAS]
        }
    }
'''
match_indent = true

# Sprite in description box
[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/utils.lua"]'
pattern = "elseif part.control.X or part.control.B then"
