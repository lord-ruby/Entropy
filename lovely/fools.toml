[[patches]]
[patches.pattern]
target = "game.lua"
pattern = "love.graphics.draw(self.CANVAS, 0, 0)"
position = "at"
payload = '''
if G.GAME.modifiers.entr_gfb and next(SMODS.find_card("j_stencil")) then
    G.STENCIL_CANVAS = G.STENCIL_CANVAS or SMODS.create_canvas()
    G.STENCIL_CANVAS:renderTo(function()
        love.graphics.clear({0,0,0,1})
        love.graphics.draw(self.CANVAS, 0, 0)
    end)
    love.graphics.setCanvas()
    love.graphics.clear({0,0,0,1})
    love.graphics.stencil(Entropy.stencil_stencil, "increment", 1)
    love.graphics.setStencilTest("greater", 0)
    love.graphics.draw(G.STENCIL_CANVAS, 0, 0)
else
    love.graphics.draw(self.CANVAS, 0, 0)
end
'''
match_indent = true


[[patches]]
[patches.pattern]
