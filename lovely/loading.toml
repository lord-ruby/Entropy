    c_base=1,
    m_bonus=3.1,
    m_mult=3.2,
    m_wild=4.1,
    m_lucky=4.2,
    m_stone=4.1,
    m_entr_flesh=4.2,
    m_steel=5.1,
    m_gold=5.2,
